name: CI-CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ci:
    name: Validate, Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # --- SECURITY & QUALITY PHASE ---

      - name: Snyk SCA
        uses: snyk/actions/node@master
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 
        with:
          command: test
          args: --severity-threshold=high --all-projects

      - name: Snyk Monitor (Web UI)
        if: github.event_name == 'push'
        uses: snyk/actions/node@master
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 
        with:
          command: monitor
          args: --all-projects

      - name: SonarQube Scan
        id: sonarqube
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.sources=backend

      
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}



      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image locally
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hms-backend:latest ./backend

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/hms-backend:latest'
          format: 'table'
          exit-code: '0' # This will fail the pipeline if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Image to Docker Hub
        if: github.event_name == 'push' && success()
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hms-backend:latest

      # --- NOTIFICATION PHASE ---

      - name: Send Success Email
        if: success() && github.event_name == 'push' 
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Deployment Ready: ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: GitHub Actions CI
          body: |
            🚀 Pipeline Success! Image is live on Docker Hub.
            
            --------------------------------------------------
            REPORT CARD:
            ✅ Snyk: High-severity check passed.
            ✅ SonarQube: Quality Gate passed.
            ✅ Trivy: Container image scan passed.
            ✅ Docker Hub: Image pushed successfully.
            --------------------------------------------------
            
            View Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Failure Email
        if: failure() && github.event_name == 'push'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Pipeline FAILED: ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: GitHub Actions CI
          body: |
            ⚠️ Attention: Pipeline Failure
            
            The build for ${{ github.repository }} failed. 
            The Docker image was NOT pushed to the registry.
            
            Please check if the failure was in the Quality Gate or the Trivy Scan.
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}