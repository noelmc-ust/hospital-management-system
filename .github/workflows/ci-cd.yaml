name: CI-CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ci:
    name: Validate Code
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Step 1: Test and Monitor. This pushes to the dashboard AND fails the build if high issues exist.
      - name: Snyk Check & Monitor
        uses: snyk/actions/node@master
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 
        with:
          command: monitor
          args: --severity-threshold=high --all-projects --project-name=hms-backend

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.sources=backend

      - name: Send Success Email
        if: success() && github.event_name == 'push' 
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Pipeline Success: ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: GitHub Actions CI
          # Beautified Body
          body: |
            🚀 Pipeline Execution Successful!
            
            The CI/CD pipeline for ${{ github.repository }} has completed successfully.
            
            --------------------------------------------------
            DETAILS:
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            - Time: ${{ github.event.head_commit.timestamp }}
            --------------------------------------------------
            
            ✅ Snyk Security Scan: Passed
            ✅ SonarQube Analysis: Completed
            
            View full run logs here:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Keep up the great work!

      - name: Send Failure Email
        if: failure() && github.event_name == 'push'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Pipeline FAILED: ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: GitHub Actions CI
          # Beautified Body
          body: |
            ⚠️ Attention: Pipeline Failure Detected
            
            The build for ${{ github.repository }} has failed during the validation stage. 
            Automated deployments have been halted until the issues are resolved.
            
            --------------------------------------------------
            CRITICAL INFO:
            - Failed Step: Validation/Security Scan
            - Commit: ${{ github.sha }}
            - Triggered by: ${{ github.actor }}
            --------------------------------------------------
            
            IMMEDIATE ACTION REQUIRED:
            Please review the logs at the link below to identify the failure:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Check for:
            1. New security vulnerabilities (Snyk)
            2. Code quality gate failures (SonarQube)
            3. Dependency installation errors