name: CI-CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ci:
    name: Validate Code
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Step 1: Security Gate - This will fail the pipeline if High/Critical vulns are found
      - name: Snyk Security Gate
        uses: snyk/actions/node@master
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 
        with:
          command: test
          args: --severity-threshold=high --all-projects

      # Step 2: Push to Dashboard - This uploads the report to the Snyk Web UI
      # We only run this on 'push' to keep your dashboard history clean
      - name: Snyk Monitor (Web UI)
        if: github.event_name == 'push'
        uses: snyk/actions/node@master
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 
        with:
          command: monitor
          args: --all-projects

      # Step 3: Static Analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.sources=backend

      # Step 4: Success Notification
      - name: Send Success Email
        if: success() && github.event_name == 'push' 
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Pipeline Success: ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: GitHub Actions CI
          body: |
            🚀 Pipeline Execution Successful!
            
            The CI/CD pipeline for ${{ github.repository }} has completed successfully.
            
            --------------------------------------------------
            DETAILS:
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            --------------------------------------------------
            
            ✅ Snyk Security Scan: Passed (No High-Severity Issues)
            ✅ Snyk Dashboard: Updated
            ✅ SonarQube Analysis: Completed
            
            View full run logs here:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Keep up the great work!

      # Step 5: Failure Notification
      - name: Send Failure Email
        if: failure() && github.event_name == 'push'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Pipeline FAILED: ${{ github.repository }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: GitHub Actions CI
          body: |
            ⚠️ Attention: Pipeline Failure Detected
            
            The build for ${{ github.repository }} has failed during the validation stage. 
            Automated deployments have been halted until the issues are resolved.
            
            --------------------------------------------------
            CRITICAL INFO:
            - Failed Step: Validation/Security Scan
            - Commit: ${{ github.sha }}
            - Triggered by: ${{ github.actor }}
            --------------------------------------------------
            
            IMMEDIATE ACTION REQUIRED:
            Please review the logs at the link below to identify the failure:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}