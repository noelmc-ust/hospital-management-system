apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: hms-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_DATABASE
          value: "hospital_management"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: hms-ns
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP
