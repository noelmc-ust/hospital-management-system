apiVersion: v1 
kind: ConfigMap 
metadata:
  name: hms-configmap 
  namespace: noel-ns
data:
  MONGODB_URI: "mongodb://mongodb-service:27017/hospital_management"
  PORT: "5000"
  NODE_ENV: "production"


---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-app
  namespace: noel-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hospital-app
  template:
    metadata:
      labels:
        app: hospital-app
    spec:
      containers:
      - name: hospital-app
        image: 10kartikey/hospital-management-system-hospital-app:latest
        ports:
        - containerPort: 5000
        env:
          - name: MONGODB_URI
            valueFrom:
              configMapKeyRef:
                name: hms-configmap 
                key: MONGODB_URI
          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: hms-configmap 
                key: PORT
          - name: NODE_ENV
            valueFrom:
              configMapKeyRef:
                name: hms-configmap 
                key: NODE_ENV   
          - name: SESSION_SECRET
            value: "hospital-secret-2024"
          - name: JWT_SECRET
            value: "jwt-secret-2024"
          - name: ADMIN_USERNAME
            value: "admin"
          - name: ADMIN_PASSWORD
            value: "admin123"
---
apiVersion: v1
kind: Service
metadata:
  name: hospital-service
  namespace: noel-ns
spec:
  selector:
    app: hospital-app
  ports:
  - port: 81
    targetPort: 5000
  type: NodePort
